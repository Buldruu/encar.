name: Publish to GitHub Packages

on:
  release:
    types: [published]

  # Гараар ажиллуулах боломж
  workflow_dispatch:
    inputs:
      version:
        description: 'Publish version (e.g. 2.0.1)'
        required: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle


      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle


      - name: Publish to GitHub Packages
        run: ./gradlew publish --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Publish summary
        run: |
          echo "## ✅ Амжилттай publish хийлээ!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`io.github.buldruu:auto-api-client\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`$(./gradlew properties -q | grep '^version:' | awk '{print $2}')\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Gradle-д ашиглах:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`groovy" >> $GITHUB_STEP_SUMMARY
          echo "repositories {" >> $GITHUB_STEP_SUMMARY
          echo "    maven {" >> $GITHUB_STEP_SUMMARY
          echo "        url = 'https://maven.pkg.github.com/Buldruu/encar'" >> $GITHUB_STEP_SUMMARY
          echo "        credentials {" >> $GITHUB_STEP_SUMMARY
          echo "            username = 'YOUR_GITHUB_USERNAME'" >> $GITHUB_STEP_SUMMARY
          echo "            password = 'YOUR_GITHUB_TOKEN'" >> $GITHUB_STEP_SUMMARY
          echo "        }" >> $GITHUB_STEP_SUMMARY
          echo "    }" >> $GITHUB_STEP_SUMMARY
          echo "}" >> $GITHUB_STEP_SUMMARY
          echo "dependencies {" >> $GITHUB_STEP_SUMMARY
          echo "    implementation 'io.github.buldruu:auto-api-client:$(./gradlew properties -q | grep '^version:' | awk '{print $2}')'" >> $GITHUB_STEP_SUMMARY
          echo "}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
